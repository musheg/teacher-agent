services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teacher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teacher}
      POSTGRES_DB: ${POSTGRES_DB:-teacher}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teacher} -d ${POSTGRES_DB:-teacher}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  alembic:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["migrate"]
    env_file: ./vars/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./vars/.env
    environment:
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-teacher}:${POSTGRES_PASSWORD:-teacher}@postgres:5432/${POSTGRES_DB:-teacher}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 4s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
