services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8078:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    environment:
      - VITE_PROXY_TARGET=http://api:8000
    depends_on:
      - api
